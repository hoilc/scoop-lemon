name: Test Manifests

on:
  workflow_dispatch:
  push:

jobs:
  forceupdate:
    name: Powershell 5
    runs-on: windows-latest
    steps:
    - name: Checkout Bucket
      uses: actions/checkout@main
      with:
        fetch-depth: 2
        path: 'my_bucket'
    - name: Checkout Scoop
      uses: actions/checkout@main
      with:
        repository: ScoopInstaller/Scoop
        ref: v0.3.0 # Pester 4
        path: 'scoop_core'
    - name: Checkout Scoop Main
      uses: actions/checkout@main
      with:
        repository: ScoopInstaller/Main
        path: 'scoop/buckets/main'
    - name: Force Update
      shell: powershell
      run: |
        cd .\my_bucket\
        bin/auto-force-update.ps1
      env:
        SCOOP_HOME: ${{ github.workspace }}\scoop_core
        SCOOP_GLOBAL: ${{ github.workspace }}\scoop_global
        SCOOP: ${{ github.workspace }}\scoop
